<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashVerse | Where Reality Bends</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS СТИЛИ --- */
        :root {
            --bg-color: #020205;
            --accent-color: #ff9d00;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* Анимированный фон со звездами */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            z-index: -1;
        }

        .stars {
            position: absolute;
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 10vw 10vh #fff, 25vw 40vh #fff, 50vw 20vh #fff, 75vw 80vh #fff, 90vw 30vh #fff, 15vw 70vh #fff;
            animation: flicker 5s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Навигация */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-family: 'Michroma', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-color);
        }

        /* Контент Hero-секции */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 0 20px;
        }

        .hero-title {
            font-family: 'Michroma', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #ffffff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .hero-subtitle {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.7;
            font-weight: 300;
        }

        /* Профессиональная кнопка (CTA) */
        .btn-youtube {
            position: relative;
            display: inline-block;
            padding: 18px 45px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
        }

        .btn-youtube:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .btn-youtube::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-youtube:hover::before {
            left: 100%;
        }

        /* Декоративный элемент "Черная дыра" на фоне */
        .portal-bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,157,0,0.05) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="space-bg">
        <div class="stars"></div>
        <div class="portal-bg"></div>
    </div>

    <nav>
        <div class="logo">Flash<span>Verse</span></div>
    </nav>

    <main class="hero">
        <h1 class="hero-title">FLASHVERSE</h1>
        <p class="hero-subtitle">Where Reality Bends</p>
        
        <a href="https://youtube.com/@flashverseyt?si=Bd1mk9Q-goiAGjOd" target="_blank" class="btn-youtube">
            Watch Channel
        </a>
    </main>

</body>
</html>
